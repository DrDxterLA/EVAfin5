<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación Módulo 5 - Fetch</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="text-center mb-4">
        <h1 class="fw-bold">Gestión de Usuarios</h1>
        <p class="text-muted">Consumo de datos con Fetch y Async/Await</p>
    </div>

    <!-- Botones -->
    <div class="row g-3 mb-4">

        <div class="col-md-4">
            <button class="btn btn-primary w-100" id="btnNombres">
                Listar nombres
            </button>
        </div>

        <div class="col-md-4">
            <button class="btn btn-success w-100" id="btnBasica">
                Info básica por nombre
            </button>
        </div>

        <div class="col-md-4">
            <button class="btn btn-warning w-100" id="btnDireccion">
                Dirección por nombre
            </button>
        </div>

        <div class="col-md-4">
            <button class="btn btn-info w-100 text-white" id="btnAvanzada">
                Info avanzada por nombre
            </button>
        </div>

        <div class="col-md-4">
            <button class="btn btn-dark w-100" id="btnCompanias">
                Compañías y catchphrase
            </button>
        </div>

        <div class="col-md-4">
            <button class="btn btn-secondary w-100" id="btnOrdenados">
                Nombres ordenados
            </button>
        </div>

    </div>

    <!-- Output -->
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            Resultado
        </div>
        <div class="card-body">
            <pre id="output" class="mb-0"></pre>
        </div>
    </div>

</div>

<script src="assets/js/app.js"></script>
</body>
</html>
